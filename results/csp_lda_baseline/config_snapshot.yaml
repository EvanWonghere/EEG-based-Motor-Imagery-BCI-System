seed: 42
preprocessing:
  reference: car
  bandpass:
  - 8
  - 30
  notch_filter: null
  artifact_rejection:
    method: null
    n_components: 15
    eog_channels: null
  bad_channel_detection: false
  epoch:
    tmin: -0.5
    tmax: 3.0
    train_tmin: 0.5
    train_tmax: 2.5
    baseline: null
    reject_threshold: 0.0001
features:
  method: csp
  params:
    n_components: 4
    log: true
model:
  type: lda
  params: {}
evaluation:
  method: stratified_kfold
  n_splits: 10
  metrics:
  - accuracy
  - kappa
  - f1_weighted
output:
  save_model: true
  save_figures: true
  save_replay_data: true
dataset:
  name: bci_iv_2a
  n_subjects: 9
  sfreq: 250.0
  n_channels: 22
  sessions:
  - session_T
  - session_E
  classes:
    left_hand: 769
    right_hand: 770
  data_subdir: MNE-bnci-data/database/data-sets/001-2014
  subjects:
  - 1
  - 2
  - 3
  - 4
  - 5
  - 6
  - 7
  - 8
  - 9
experiment:
  name: csp_lda_baseline
  description: CSP + LDA 基线实验 (BCI IV 2a)
