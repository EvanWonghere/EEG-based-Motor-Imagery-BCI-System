seed: 42
preprocessing:
  reference: car
  bandpass:
  - 8
  - 30
  notch_filter: null
  artifact_rejection:
    method: null
    n_components: 15
    eog_channels: null
  bad_channel_detection: false
  epoch:
    tmin: -0.5
    tmax: 3.0
    train_tmin: 0.5
    train_tmax: 2.5
    baseline: null
    reject_threshold: 0.0001
features:
  method: null
  params:
    n_components: 4
    log: true
model:
  type: eegnet
  params:
    n_classes: 2
    dropout: 0.25
    F1: 8
    D: 2
    F2: 16
    kernel_length: 64
    learning_rate: 0.001
    weight_decay: 0.0001
    batch_size: 32
    n_epochs: 220
    early_stopping: false
    patience: 40
    val_split: 0.05
    lr_scheduler_factor: 0.5
    lr_scheduler_patience: 10
    min_delta: 0.0001
evaluation:
  method: stratified_kfold
  n_splits: 5
  metrics:
  - accuracy
  - kappa
  - f1_weighted
output:
  save_model: true
  save_figures: true
  save_replay_data: true
dataset:
  name: bci_iv_2a
  n_subjects: 9
  sfreq: 250.0
  n_channels: 22
  sessions:
  - session_T
  - session_E
  classes:
    left_hand: 769
    right_hand: 770
  data_subdir: MNE-bnci-data/database/data-sets/001-2014
  subjects:
  - 1
  - 2
  - 3
  - 4
  - 5
  - 6
  - 7
  - 8
  - 9
  train_sessions:
  - session_T
experiment:
  name: eegnet_2a
  description: EEGNet 在 BCI IV 2a 上的实验
