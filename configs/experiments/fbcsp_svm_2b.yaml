# ============================================================================
# FBCSP + SVM-RBF 实验 (BCI IV 2b)
# ============================================================================
# 2b 仅 3 通道，每子带 CSP 分量数限制为 2（7×2=14 维 → 选 8 维）。
#
# 运行：python scripts/train.py --config configs/experiments/fbcsp_svm_2b.yaml
# ============================================================================

experiment:
  name: "fbcsp_svm_2b"
  description: "FBCSP + SVM-RBF 实验 (BCI IV 2b)"

dataset:
  name: "bci_iv_2b"
  subjects: [1, 2, 3, 4, 5, 6, 7, 8, 9]
  train_sessions: ["session_T"]

preprocessing:
  bandpass: [4, 40]
  artifact_rejection:
    method: null                          # 2b 无 EOG 通道，跳过 ICA

features:
  method: "fbcsp"
  params:
    filter_bands:
      - [4, 8]
      - [8, 12]
      - [12, 16]
      - [16, 20]
      - [20, 24]
      - [24, 28]
      - [28, 32]
    n_components: 2                       # 3 通道限制
    selection:
      method: "mutual_info"
      n_select: 8

model:
  type: "svm"
  params:
    kernel: "rbf"
    C: 1.0
