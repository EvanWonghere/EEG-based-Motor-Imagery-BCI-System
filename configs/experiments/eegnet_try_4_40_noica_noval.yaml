experiment:
  name: "eegnet_try_4_40_noica_noval"
  description: "EEGNet ablation: 4-40Hz, no ICA, no internal val split"

dataset:
  name: "bci_iv_2a"
  subjects: [1]
  train_sessions: ["session_T"]

preprocessing:
  bandpass: [4, 40]
  artifact_rejection:
    method: null

features:
  method: null

model:
  type: "eegnet"
  params:
    n_classes: 2
    dropout: 0.25
    F1: 8
    D: 2
    F2: 16
    kernel_length: 64
    learning_rate: 0.001
    weight_decay: 0.0001
    batch_size: 32
    n_epochs: 180
    patience: 30
    val_split: 0.0
    lr_scheduler_factor: 0.5
    lr_scheduler_patience: 8
    min_delta: 0.0

evaluation:
  n_splits: 5
