# ============================================================================
# 基线实验：CSP + LDA (BCI IV 2a)
# ============================================================================
# 经典 MI-BCI 基线方案：
#   - 带通滤波 8-30 Hz (Mu + Beta)
#   - CSP 提取 4 个空间滤波器组分 → 4 维对数方差特征
#   - LDA 分类器
#   - 10 折分层交叉验证
#
# 运行：python scripts/train.py --config configs/experiments/csp_lda_baseline.yaml
# ============================================================================

experiment:
  name: "csp_lda_baseline"
  description: "CSP + LDA 基线实验 (BCI IV 2a)"

dataset:
  name: "bci_iv_2a"
  subjects: [1, 2, 3, 4, 5, 6, 7, 8, 9]

# preprocessing 使用 default.yaml 默认值：
#   reference: car, bandpass: [8, 30], no ICA

features:
  method: "csp"
  params:
    n_components: 4
    log: true

model:
  type: "lda"
  params: {}
